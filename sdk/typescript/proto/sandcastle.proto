syntax = "proto3";

package sandcastle.v1;

// The SandCastle sandbox execution service.
service SandCastleService {
  // Execute JavaScript code in a new sandbox.
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);

  // Get runtime information.
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
}

message ExecuteRequest {
  // JavaScript code to execute.
  string code = 1;

  // JSON-encoded input available to the guest code.
  bytes input_json = 2;

  // Resource limits.
  Limits limits = 3;

  // Input artifacts to mount into the sandbox.
  repeated Artifact input_artifacts = 4;
}

message ExecuteResponse {
  // Execution status.
  ExecutionStatus status = 1;

  // Output value as JSON bytes.
  bytes output_json = 2;

  // Full execution transcript.
  ExecutionTranscript transcript = 3;

  // Output artifacts produced by the sandbox.
  repeated Artifact output_artifacts = 4;
}

message Limits {
  // Maximum memory in megabytes.
  uint32 memory_mb = 1;

  // Wall-clock timeout in milliseconds.
  uint64 timeout_ms = 2;

  // Fuel units (instruction count cap). 0 = unlimited.
  uint64 fuel = 3;

  // Maximum output size in bytes.
  uint64 max_output_bytes = 4;
}

message Artifact {
  string name = 1;
  bytes data = 2;
}

enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_SUCCESS = 1;
  EXECUTION_STATUS_TIMEOUT = 2;
  EXECUTION_STATUS_FUEL_EXHAUSTED = 3;
  EXECUTION_STATUS_MEMORY_EXCEEDED = 4;
  EXECUTION_STATUS_CANCELLED = 5;
  EXECUTION_STATUS_GUEST_ERROR = 6;
  EXECUTION_STATUS_CAPABILITY_ERROR = 7;
}

message ExecutionTranscript {
  string execution_id = 1;
  string started_at = 2;
  string finished_at = 3;
  ExecutionStatus status = 4;
  uint64 fuel_consumed = 5;
  uint64 fuel_limit = 6;
  uint64 peak_memory_bytes = 7;
  uint64 memory_limit_bytes = 8;
  bytes output_json = 9;
  repeated ConsoleMessage console = 10;
  repeated CapabilityCallRecord capability_calls = 11;
  repeated string input_artifact_names = 12;
  repeated string output_artifact_names = 13;
}

message ConsoleMessage {
  string level = 1;  // "log", "warn", "error", "debug"
  string message = 2;
  uint64 ts = 3;     // milliseconds relative to execution start
}

message CapabilityCallRecord {
  string capability = 1;
  string method = 2;
  bytes input_json = 3;
  bytes output_json = 4;
  string error = 5;
  uint64 duration_ms = 6;
  uint64 ts = 7;
}

message GetInfoRequest {}

message GetInfoResponse {
  string version = 1;
  string runtime = 2;
  string security_mode = 3;
  string platform = 4;
}
