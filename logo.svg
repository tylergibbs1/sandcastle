<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4C769"/>
      <stop offset="100%" stop-color="#D4A03C"/>
    </linearGradient>
    <linearGradient id="tower" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7D88A"/>
      <stop offset="100%" stop-color="#D4A03C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Base / ground -->
  <ellipse cx="256" cy="400" rx="200" ry="35" fill="#E8B94A" opacity="0.4"/>

  <!-- Castle base wall -->
  <rect x="136" y="280" width="240" height="120" rx="6" fill="url(#sand)"/>

  <!-- Battlements on base wall -->
  <rect x="136" y="265" width="35" height="25" rx="3" fill="url(#tower)"/>
  <rect x="196" y="265" width="35" height="25" rx="3" fill="url(#tower)"/>
  <rect x="256" y="265" width="35" height="25" rx="3" fill="url(#tower)"/>
  <rect x="316" y="265" width="35" height="25" rx="3" fill="url(#tower)"/>

  <!-- Left tower -->
  <rect x="120" y="180" width="60" height="220" rx="5" fill="url(#tower)"/>
  <rect x="115" y="165" width="70" height="22" rx="3" fill="url(#sand)"/>
  <!-- Left tower battlement -->
  <rect x="115" y="148" width="18" height="22" rx="2" fill="url(#tower)"/>
  <rect x="141" y="148" width="18" height="22" rx="2" fill="url(#tower)"/>
  <rect x="167" y="148" width="18" height="22" rx="2" fill="url(#tower)"/>

  <!-- Right tower -->
  <rect x="332" y="180" width="60" height="220" rx="5" fill="url(#tower)"/>
  <rect x="327" y="165" width="70" height="22" rx="3" fill="url(#sand)"/>
  <!-- Right tower battlement -->
  <rect x="327" y="148" width="18" height="22" rx="2" fill="url(#tower)"/>
  <rect x="353" y="148" width="18" height="22" rx="2" fill="url(#tower)"/>
  <rect x="379" y="148" width="18" height="22" rx="2" fill="url(#tower)"/>

  <!-- Center tower (tallest) -->
  <rect x="216" y="120" width="80" height="280" rx="5" fill="url(#tower)"/>
  <rect x="210" y="102" width="92" height="25" rx="3" fill="url(#sand)"/>
  <!-- Center tower battlements -->
  <rect x="210" y="82" width="20" height="26" rx="2" fill="url(#tower)"/>
  <rect x="240" y="82" width="20" height="26" rx="2" fill="url(#tower)"/>
  <rect x="270" y="82" width="20" height="26" rx="2" fill="url(#tower)"/>

  <!-- Gate arch -->
  <path d="M 230 400 L 230 340 A 26 26 0 0 1 282 340 L 282 400 Z" fill="#8B6914"/>
  <path d="M 234 400 L 234 342 A 22 22 0 0 1 278 342 L 278 400 Z" fill="#6B4F10"/>

  <!-- WASM/code symbol in gate - terminal cursor -->
  <rect x="247" y="355" width="18" height="3" rx="1" fill="#34D399"/>
  <text x="249" y="378" font-family="monospace" font-size="14" font-weight="bold" fill="#34D399">&gt;_</text>

  <!-- Glowing brackets on center tower - representing code/sandbox -->
  <text x="232" y="220" font-family="monospace" font-size="36" font-weight="bold" fill="url(#glow)" opacity="0.9">{</text>
  <text x="264" y="220" font-family="monospace" font-size="36" font-weight="bold" fill="url(#glow)" opacity="0.9">}</text>

  <!-- Small windows on towers -->
  <rect x="140" y="220" width="16" height="20" rx="8" fill="#8B6914" opacity="0.6"/>
  <rect x="352" y="220" width="16" height="20" rx="8" fill="#8B6914" opacity="0.6"/>
  <rect x="140" y="270" width="16" height="20" rx="8" fill="#8B6914" opacity="0.6"/>
  <rect x="352" y="270" width="16" height="20" rx="8" fill="#8B6914" opacity="0.6"/>

  <!-- Subtle shield/lock icon on center tower -->
  <path d="M 256 240 L 244 248 L 244 262 C 244 272 256 280 256 280 C 256 280 268 272 268 262 L 268 248 Z"
        fill="none" stroke="#34D399" stroke-width="2.5" opacity="0.8"/>
  <circle cx="256" cy="258" r="4" fill="#34D399" opacity="0.8"/>

  <!-- Text -->
  <text x="256" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#D4A03C" letter-spacing="4">SANDCASTLE</text>
</svg>
