<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Sand mound base -->
  <ellipse cx="256" cy="380" rx="175" ry="45" fill="#F5D889"/>
  <ellipse cx="256" cy="380" rx="175" ry="45" fill="none" stroke="#D4A843" stroke-width="3"/>

  <!-- Castle body -->
  <path d="M 160 260 L 160 380 Q 256 395 352 380 L 352 260 Z" fill="#F5D889"/>
  <path d="M 160 260 L 160 380 Q 256 395 352 380 L 352 260" fill="none" stroke="#D4A843" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Left tower -->
  <rect x="140" y="175" width="55" height="110" rx="4" fill="#F5D889"/>
  <rect x="140" y="175" width="55" height="110" rx="4" fill="none" stroke="#D4A843" stroke-width="3"/>
  <!-- Left tower top -->
  <path d="M 135 175 L 140 155 L 155 145 L 167 155 L 180 145 L 195 155 L 200 175" fill="#F5D889" stroke="#D4A843" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Right tower -->
  <rect x="317" y="175" width="55" height="110" rx="4" fill="#F5D889"/>
  <rect x="317" y="175" width="55" height="110" rx="4" fill="none" stroke="#D4A843" stroke-width="3"/>
  <!-- Right tower top -->
  <path d="M 312 175 L 317 155 L 332 145 L 344 155 L 357 145 L 372 155 L 377 175" fill="#F5D889" stroke="#D4A843" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Center tower -->
  <rect x="220" y="115" width="72" height="170" rx="4" fill="#F5D889"/>
  <rect x="220" y="115" width="72" height="170" rx="4" fill="none" stroke="#D4A843" stroke-width="3"/>
  <!-- Center tower top -->
  <path d="M 214 115 L 220 92 L 236 80 L 256 72 L 276 80 L 292 92 L 298 115" fill="#F5D889" stroke="#D4A843" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Flag on center tower -->
  <line x1="256" y1="72" x2="256" y2="38" stroke="#D4A843" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 256 38 L 280 48 L 256 58" fill="#34D399" stroke="#D4A843" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Gate arch -->
  <path d="M 234 380 L 234 325 Q 234 300 256 300 Q 278 300 278 325 L 278 380" fill="#D4A843" stroke="#D4A843" stroke-width="2"/>

  <!-- Terminal cursor in gate -->
  <text x="244" y="352" font-family="monospace" font-size="16" font-weight="bold" fill="#34D399">&gt;_</text>

  <!-- Face - eyes -->
  <circle cx="210" cy="230" r="8" fill="#D4A843"/>
  <circle cx="302" cy="230" r="8" fill="#D4A843"/>
  <!-- Eye shine -->
  <circle cx="213" cy="227" r="2.5" fill="#FFF8E7"/>
  <circle cx="305" cy="227" r="2.5" fill="#FFF8E7"/>

  <!-- Face - smile -->
  <path d="M 232 252 Q 256 272 280 252" fill="none" stroke="#D4A843" stroke-width="3" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="198" cy="250" rx="12" ry="8" fill="#F0A8A8" opacity="0.35"/>
  <ellipse cx="314" cy="250" rx="12" ry="8" fill="#F0A8A8" opacity="0.35"/>

  <!-- Small sand details -->
  <circle cx="120" cy="390" r="6" fill="#EDD07A" stroke="#D4A843" stroke-width="1.5"/>
  <circle cx="395" cy="388" r="5" fill="#EDD07A" stroke="#D4A843" stroke-width="1.5"/>
  <circle cx="100" cy="382" r="3.5" fill="#EDD07A" stroke="#D4A843" stroke-width="1"/>

  <!-- Text -->
  <text x="256" y="458" text-anchor="middle" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="36" font-weight="700" fill="#D4A843" letter-spacing="2">SandCastle</text>
</svg>
