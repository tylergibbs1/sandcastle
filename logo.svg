<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Shadow base -->
  <ellipse cx="256" cy="388" rx="155" ry="28" fill="#3f3f46" opacity="0.15"/>

  <!-- Castle body -->
  <rect x="155" y="245" width="202" height="140" rx="8" fill="#d4d4d8"/>

  <!-- Body battlements -->
  <rect x="155" y="225" width="38" height="28" rx="4" fill="#d4d4d8"/>
  <rect x="210" y="225" width="38" height="28" rx="4" fill="#d4d4d8"/>
  <rect x="265" y="225" width="38" height="28" rx="4" fill="#d4d4d8"/>
  <rect x="319" y="225" width="38" height="28" rx="4" fill="#d4d4d8"/>

  <!-- Left tower -->
  <rect x="130" y="155" width="62" height="232" rx="6" fill="#a1a1aa"/>
  <rect x="124" y="140" width="74" height="20" rx="4" fill="#d4d4d8"/>
  <rect x="124" y="118" width="20" height="28" rx="3" fill="#a1a1aa"/>
  <rect x="151" y="118" width="20" height="28" rx="3" fill="#a1a1aa"/>
  <rect x="178" y="118" width="20" height="28" rx="3" fill="#a1a1aa"/>

  <!-- Right tower -->
  <rect x="320" y="155" width="62" height="232" rx="6" fill="#a1a1aa"/>
  <rect x="314" y="140" width="74" height="20" rx="4" fill="#d4d4d8"/>
  <rect x="314" y="118" width="20" height="28" rx="3" fill="#a1a1aa"/>
  <rect x="341" y="118" width="20" height="28" rx="3" fill="#a1a1aa"/>
  <rect x="368" y="118" width="20" height="28" rx="3" fill="#a1a1aa"/>

  <!-- Center tower -->
  <rect x="212" y="88" width="88" height="300" rx="6" fill="#a1a1aa"/>
  <rect x="204" y="70" width="104" height="24" rx="5" fill="#d4d4d8"/>
  <rect x="204" y="45" width="24" height="32" rx="4" fill="#a1a1aa"/>
  <rect x="244" y="45" width="24" height="32" rx="4" fill="#a1a1aa"/>
  <rect x="284" y="45" width="24" height="32" rx="4" fill="#a1a1aa"/>

  <!-- Gate arch -->
  <path d="M 232 388 L 232 318 A 24 24 0 0 1 280 318 L 280 388 Z" fill="#52525b"/>

  <!-- Terminal prompt in gate -->
  <text x="243" y="362" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" font-weight="600" fill="#e4e4e7">&gt;_</text>

  <!-- Code brackets on center tower -->
  <text x="230" y="192" font-family="'SF Mono', 'Fira Code', monospace" font-size="42" font-weight="700" fill="#52525b" opacity="0.8">{</text>
  <text x="268" y="192" font-family="'SF Mono', 'Fira Code', monospace" font-size="42" font-weight="700" fill="#52525b" opacity="0.8">}</text>

  <!-- Tower windows -->
  <rect x="148" y="195" width="14" height="20" rx="7" fill="#71717a" opacity="0.5"/>
  <rect x="148" y="240" width="14" height="20" rx="7" fill="#71717a" opacity="0.5"/>
  <rect x="148" y="285" width="14" height="20" rx="7" fill="#71717a" opacity="0.5"/>
  <rect x="350" y="195" width="14" height="20" rx="7" fill="#71717a" opacity="0.5"/>
  <rect x="350" y="240" width="14" height="20" rx="7" fill="#71717a" opacity="0.5"/>
  <rect x="350" y="285" width="14" height="20" rx="7" fill="#71717a" opacity="0.5"/>

  <!-- Shield icon on center tower -->
  <path d="M 256 210 L 243 218 L 243 233 C 243 244 256 252 256 252 C 256 252 269 244 269 233 L 269 218 Z"
        fill="none" stroke="#52525b" stroke-width="2.5" stroke-linejoin="round" opacity="0.7"/>
  <circle cx="256" cy="230" r="4" fill="#52525b" opacity="0.7"/>

  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="38" font-weight="800" fill="#3f3f46" letter-spacing="1">SandCastle</text>
</svg>
